<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone-Portfolio Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">

</head>

<body>
    <!-- ---------------------------------------------------TOP CONTENT--------------------------------------------------------- -->
    <div class="header">

        <div class="leftheader">
            <div class="logo">
                <img src="logos/logo.jpg" alt="logo">
            </div>
            <button class="home_icon" aria-label="Home">
                <!-- ----------------home-icon --------------------->
                <svg class="home" data-encore-id="icon" role="img" aria-hidden="true" viewBox="0 0 24 24" width="24"
                    height="24">
                    <path fill="white"
                        d="M12.5 3.247a1 1 0 0 0-1 0L4 7.577V20h4.5v-6a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v6H20V7.577l-7.5-4.33zm-2-1.732a3 3 0 0 1 3 0l7.5 4.33a2 2 0 0 1 1 1.732V21a1 1 0 0 1-1 1h-6.5a1 1 0 0 1-1-1v-6h-3v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.577a2 2 0 0 1 1-1.732l7.5-4.33z">
                    </path>
                </svg>

            </button>
            <div class="search">
                <!---------------------------- search-icon --------------------------------->
                <svg class="search-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor"
                        d="M10.533 1.27a9.262 9.262 0 105.739 16.535l3.52 3.52a.75.75 0 101.06-1.06l-3.52-3.52A9.262 9.262 0 0010.533 1.27zm-7.762 9.262a7.762 7.762 0 1115.525 0 7.762 7.762 0 01-15.525 0z">
                    </path>
                </svg>
                <input id="search_input" type="text" class="search-input" placeholder="What do you want to play?">
                <div class="search-right-content">
                    <div class="divider"></div>
                    <button class="browse-button" aria-label="Browse">
                        <!-- -----------------------file-type-icon ---------------------------->
                        <svg role="img" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15 15.5c0 1.105-.895 2-2 2s-2-.895-2-2 .895-2 2-2 2 .895 2 2z"></path>
                            <path
                                d="M1.513 9.37A1 1 0 0 1 2.5 8.5h19a1 1 0 0 1 .987.87l1.5 11.5a1 1 0 0 1-.987 1.13H1a1 1 0 0 1-.987-1.13l1.5-11.5zM3.41 10.5l-1.304 10h19.788l-1.304-10H3.411zm15.59-7a1 1 0 0 1 .987.87l.391 3H2.622l.391-3A1 1 0 0 1 4 3.5h16z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
 
        <div class="rightheader">
            <button class="option-button no1">Premium</button>
            <button class="option-button no2"> Support</button>
            <button class="option-button no3">Dowload</button>
            <div class="divider2"></div>
            <button class="install-button">
                <!-- -------------------------------dowload-icon ------------------------------->
                <svg role="img" height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18zM1 12C1 5.925 5.925 1 12 1s11 4.925 11 11-4.925 11-11 11S1 18.075 1 12z">
                    </path>
                    <path d="M12 17.25l-4.25-4.25 1.06-1.06 2.44 2.44V6.75h1.5v7.63l2.44-2.44 1.06 1.06L12 17.25z">
                    </path>
                </svg>
                <span class="install">Install App</span>
            </button>
            <button class="signup">Sign up</button>
            <button class="login">Log in</button>
        </div>
    </div>

    <!------------------------------------------------------- MIDDLE CONTENT ---------------------------------------------------->

    <div class="main-content">

        <div class="left-box" id="leftbox">
            <div class="box11">
                <div class="box12">
                    <div class="library-icon">
                        <button class="library-button"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg> </button>

                    </div>
                    <div class="library">Your Library</div>
                </div>

                <div class="box22">
                    <button class="add-library">
                        <svg class="icon" viewBox="0 0 100 100" fill="currentColor">
                            <!------------------------------------ plus-icon ------------------------------------>
                            <line class="line vertical" x1="50" y1="10" x2="50" y2="90" />
                            <line class="line horizontal" x1="10" y1="50" x2="90" y2="50" />
                        </svg>
                        <span>Create</span>
                    </button>
                    <button class="inlarger"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 4h7v7" />
                            <path d="M20 4l-7 7" />

                            <path d="M11 20H4v-7" />
                            <path d="M4 20l7-7" />
                        </svg> </button>
                </div>
            </div>

            <div class="playlist_head">

                <div class="playlist1"></div>
            </div>


        </div>


        <div class="resizer" id="dragMe"></div>

        <div class="right-box">
            <div class="headbox">
                <button class="sort">All</button>
                <button class="sort">Music</button>
                <button class="sort">Podcasts</button>
            </div>
            <div class="song-list">
                <div class="main-heading">English</div>
                <div class="allsongs1"></div>
            </div>
            <div class="song-list">
                <div class="main-heading">Hindi</div>
                <div class="allsongs2"></div>
            </div>
        </div>
    </div>
    <div class="player">
        <!-- ------------------------------------------------------player left -------------------------------->
        <div class="player_left">
            <div class="coverpage"></div>
            <div class="nameofsong"></div>
            <div class="add-in-library"></div>
        </div>
        <!------------------------------------------------------- player centre --------------------------------->
        <div class="player_centre">
            <div class="player_control">
                <button class="play_buttons">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 20L9 12L19 4V20Z" fill="currentColor" />
                        <path d="M5 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <button class="play_buttons1">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 4V20L20 12L7 4Z" fill="currentColor" stroke="currentColor" stroke-width="2"
                            stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="play_buttons">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 4L15 12L5 20V4Z" fill="currentColor" />
                        <path d="M19 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="player_timeline">
                <div class="progress-bar">
                    <span class="current-time">0:00</span>
                    <input type="range" min="0" max="100" value="0" class="song-bar">
                    <span class="total-time">0:00</span>
                </div>
                <audio id="audio-player" src="#"></audio>
            </div>
        </div>
        <!--------------------------------------------------------------- player right -------------------------------------------->
        <div class="player_right">
            <input type="range" id="volume-bar" min="0" max="100" value="0">
            <button class="play_buttons mute" id="muted">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 5L6 9H2V15H6L11 19V5Z" fill="currentColor" />
                    <path d="M15.5 8.5C16.8333 9.66667 17.5 10.8333 17.5 12C17.5 13.1667 16.8333 14.3333 15.5 15.5"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    <path d="M19 5C21 7.33333 22 9.66667 22 12C22 14.3333 21 16.6667 19 19" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <button class="play_buttons dowl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3V16M12 16L7 11M12 16L17 11" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M19 21H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </div>

    <script src="index.js"></script>

</body>

</html>
